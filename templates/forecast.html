{% extends "base.html" %}
{% block content %}
<style>
    .chart-card { height: 100%; }
    .chart-card .card-body { padding: 0.75rem; }
    .chart-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .chart-thumb {
        width: 44px; height: 44px; object-fit: cover;
        border-radius: 4px; background: #2a2d35; flex-shrink: 0;
        border: 1px solid #3a3f4b;
    }
    .chart-thumb-fallback {
        width: 44px; height: 44px; border-radius: 4px;
        background: #2a2d35; border: 1px solid #3a3f4b; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: #6c757d; font-size: 0.7rem;
    }
    .chart-name { color: #e0e0e0; font-weight: bold; font-size: 0.95rem; line-height: 1.2; }
    .chart-meta { color: #8a8f99; font-size: 0.75rem; }
    .chart-canvas-wrap { position: relative; height: 180px; }
    .forecast-summary { font-size: 0.8rem; margin-top: 0.4rem; color: #b0b6c0;
                       display: flex; justify-content: space-between; }
    .summary-warning { color: #fd7e14; }
    .empty-note { color: #8a8f99; font-size: 0.9rem; text-align: center; padding: 60px 0; }
    .today-badge {
        background: #2a2d35; color: #b0b6c0; padding: 2px 8px;
        border-radius: 3px; font-size: 0.75rem; border: 1px solid #3a3f4b;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">價格預測 <span class="today-badge ms-2">今日 {{ '' }}<span id="today-text">…</span></span></h3>
    <div class="text-muted small">以每物品同星期幾歷史中位數為基準，套上全區漲跌修正</div>
</div>

<ul class="nav nav-tabs mb-3" id="region-tabs">
    <li class="nav-item"><a class="nav-link active" data-region="valley_iv" href="#">四號谷地</a></li>
    <li class="nav-item"><a class="nav-link" data-region="wuling" href="#">武陵</a></li>
</ul>

<div id="charts-grid" class="row g-3"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function () {
    let currentRegion = 'valley_iv';
    const charts = {};

    function destroyAll() {
        Object.values(charts).forEach(c => c.destroy());
        for (const k in charts) delete charts[k];
    }

    function summaryHtml(myF, friendF) {
        const myWarn = myF.data_insufficient;
        const friendWarn = friendF.data_insufficient;
        const myCls = myWarn ? 'summary-warning' : '';
        const friendCls = friendWarn ? 'summary-warning' : '';
        const myConf = (myF.confidence * 100).toFixed(0);
        const friendConf = (friendF.confidence * 100).toFixed(0);
        const myLast = myF.predictions.length ? myF.predictions[myF.predictions.length - 1].predicted : '—';
        const friendLast = friendF.predictions.length ? friendF.predictions[friendF.predictions.length - 1].predicted : '—';
        const insufficientTag = (myWarn || friendWarn)
            ? '<div class="summary-warning" style="font-size:0.75rem;margin-top:2px;">資料不足，僅供參考</div>'
            : '';
        return `
            <div class="forecast-summary">
                <span class="${myCls}">第 7 天｜我 <strong>${myLast}</strong>（信心 ${myConf}%）</span>
                <span class="${friendCls}">好友 <strong>${friendLast}</strong>（信心 ${friendConf}%）</span>
            </div>${insufficientTag}`;
    }

    function renderCard(item) {
        return `
            <div class="col-md-6 col-xl-4">
                <div class="card chart-card">
                    <div class="card-body">
                        <div class="chart-header">
                            <img class="chart-thumb" src="/item_image/${item.item_id}"
                                 alt="${item.name_cn}"
                                 onerror="this.outerHTML='<div class=&quot;chart-thumb-fallback&quot;>#${item.item_id}</div>'">
                            <div class="flex-grow-1">
                                <div class="chart-name">${item.name_cn}</div>
                                <div class="chart-meta">#${item.item_id} · ${item.name_en || ''}</div>
                            </div>
                        </div>
                        <div class="chart-canvas-wrap">
                            <canvas id="chart-${item.item_id}"></canvas>
                        </div>
                        ${summaryHtml(item.my_forecast, item.friend_forecast)}
                    </div>
                </div>
            </div>`;
    }

    function drawChart(item) {
        const ctx = document.getElementById(`chart-${item.item_id}`);
        if (!ctx) return;
        const myPreds = item.my_forecast.predictions;
        const fPreds = item.friend_forecast.predictions;
        const allDates = Array.from(new Set([
            ...myPreds.map(p => p.date), ...fPreds.map(p => p.date),
        ])).sort();
        const myMap = Object.fromEntries(myPreds.map(p => [p.date, p.predicted]));
        const fMap = Object.fromEntries(fPreds.map(p => [p.date, p.predicted]));
        const labels = allDates.map(d => d.slice(5));

        charts[item.item_id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: '我的市場價（預測）',
                        data: allDates.map(d => myMap[d] ?? null),
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13,110,253,0.1)',
                        spanGaps: true, tension: 0.2, pointRadius: 3,
                    },
                    {
                        label: '好友最高價（預測）',
                        data: allDates.map(d => fMap[d] ?? null),
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220,53,69,0.1)',
                        spanGaps: true, tension: 0.2, pointRadius: 3,
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { boxWidth: 10, font: { size: 10 }, color: '#b0b6c0' } },
                    tooltip: { callbacks: { title: (items) => items[0] && allDates[items[0].dataIndex] } },
                },
                scales: {
                    y: { ticks: { font: { size: 10 }, color: '#8a8f99' }, grid: { color: '#2a2d35' } },
                    x: {
                        ticks: { font: { size: 10 }, color: '#8a8f99', autoSkip: true, maxTicksLimit: 10 },
                        grid: { color: '#2a2d35' },
                    },
                },
            },
        });
    }

    async function load() {
        const grid = document.getElementById('charts-grid');
        grid.innerHTML = '<div class="col-12 empty-note">載入中…</div>';
        destroyAll();
        let data;
        try {
            const r = await fetch(`/api/forecast-data?region=${currentRegion}`);
            data = await r.json();
        } catch (e) {
            grid.innerHTML = `<div class="col-12 empty-note">載入失敗：${e}</div>`;
            return;
        }
        if (!data.ok || !data.items.length) {
            grid.innerHTML = '<div class="col-12 empty-note">此地區尚無資料</div>';
            return;
        }
        document.getElementById('today-text').textContent = data.today;
        grid.innerHTML = data.items.map(renderCard).join('');
        data.items.forEach(it => drawChart(it));
    }

    document.querySelectorAll('#region-tabs a').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('#region-tabs a').forEach(x => x.classList.remove('active'));
            a.classList.add('active');
            currentRegion = a.dataset.region;
            load();
        });
    });

    load();
})();
</script>
{% endblock %}
