{% extends "base.html" %}
{% block content %}
<style>
    .chart-card { height: 100%; }
    .chart-card .card-body { padding: 0.75rem; }
    .chart-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .chart-thumb {
        width: 44px; height: 44px; object-fit: cover;
        border-radius: 4px; background: #2a2d35; flex-shrink: 0;
        border: 1px solid #3a3f4b;
    }
    .chart-thumb-fallback {
        width: 44px; height: 44px; border-radius: 4px;
        background: #2a2d35; border: 1px solid #3a3f4b; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: #6c757d; font-size: 0.7rem;
    }
    .chart-name { color: #e0e0e0; font-weight: bold; font-size: 0.95rem; line-height: 1.2; }
    .chart-meta { color: #8a8f99; font-size: 0.75rem; }
    .chart-canvas-wrap { position: relative; height: 180px; }
    .empty-note { color: #8a8f99; font-size: 0.9rem; text-align: center; padding: 60px 0; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">歷史走勢 + 預測</h3>
    <div>
        <div class="btn-group btn-group-sm me-2" role="group" id="days-group">
            <button type="button" class="btn btn-outline-primary" data-days="7">7 天</button>
            <button type="button" class="btn btn-outline-primary" data-days="14">14 天</button>
            <button type="button" class="btn btn-outline-primary active" data-days="30">30 天</button>
        </div>
    </div>
</div>

<ul class="nav nav-tabs mb-3" id="region-tabs">
    <li class="nav-item"><a class="nav-link active" data-region="valley_iv" href="#">四號谷地</a></li>
    <li class="nav-item"><a class="nav-link" data-region="wuling" href="#">武陵</a></li>
</ul>

<div id="charts-grid" class="row g-3"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function () {
    let currentRegion = 'valley_iv';
    let currentDays = 30;
    const charts = {};

    function destroyAll() {
        Object.values(charts).forEach(c => c.destroy());
        for (const k in charts) delete charts[k];
    }

    function renderCard(item) {
        return `
            <div class="col-md-6 col-xl-4">
                <div class="card chart-card">
                    <div class="card-body">
                        <div class="chart-header">
                            <img class="chart-thumb" src="/item_image/${item.item_id}"
                                 alt="${item.name_cn}"
                                 onerror="this.outerHTML='<div class=&quot;chart-thumb-fallback&quot;>#${item.item_id}</div>'">
                            <div class="flex-grow-1">
                                <div class="chart-name">${item.name_cn}</div>
                                <div class="chart-meta">#${item.item_id} · ${item.name_en || ''}</div>
                            </div>
                        </div>
                        <div class="chart-canvas-wrap">
                            <canvas id="chart-${item.item_id}"></canvas>
                        </div>
                    </div>
                </div>
            </div>`;
    }

    function drawChart(item) {
        const ctx = document.getElementById(`chart-${item.item_id}`);
        if (!ctx) return;
        const labels = Array.from(new Set([
            ...item.my_series.map(p => p.date),
            ...item.friend_series.map(p => p.date),
        ])).sort();
        const myMap = Object.fromEntries(item.my_series.map(p => [p.date, p.price]));
        const friendMap = Object.fromEntries(item.friend_series.map(p => [p.date, p.price]));
        charts[item.item_id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.map(d => d.slice(5)),
                datasets: [
                    {
                        label: '我的市場價',
                        data: labels.map(d => myMap[d] ?? null),
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13,110,253,0.1)',
                        spanGaps: true,
                        tension: 0.2,
                    },
                    {
                        label: '好友最高價',
                        data: labels.map(d => friendMap[d] ?? null),
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220,53,69,0.1)',
                        spanGaps: true,
                        tension: 0.2,
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } },
                scales: {
                    y: { ticks: { font: { size: 10 } } },
                    x: { ticks: { font: { size: 10 }, autoSkip: true, maxTicksLimit: 8 } },
                },
            },
        });
    }

    async function load() {
        const grid = document.getElementById('charts-grid');
        grid.innerHTML = '<div class="col-12 empty-note">載入中…</div>';
        destroyAll();
        let data;
        try {
            const r = await fetch(`/api/history-data?region=${currentRegion}&days=${currentDays}`);
            data = await r.json();
        } catch (e) {
            grid.innerHTML = `<div class="col-12 empty-note">載入失敗：${e}</div>`;
            return;
        }
        if (!data.ok || !data.items.length) {
            grid.innerHTML = '<div class="col-12 empty-note">此地區尚無資料</div>';
            return;
        }
        grid.innerHTML = data.items.map(renderCard).join('');
        data.items.forEach(drawChart);
    }

    document.querySelectorAll('#region-tabs a').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('#region-tabs a').forEach(x => x.classList.remove('active'));
            a.classList.add('active');
            currentRegion = a.dataset.region;
            load();
        });
    });
    document.querySelectorAll('#days-group button').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('#days-group button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            currentDays = parseInt(b.dataset.days, 10);
            load();
        });
    });

    load();
})();
</script>
{% endblock %}
